name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Fabric mod and Paper plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build --warning-mode all

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: mob-bossbar-jars
          path: |
            fabric/build/libs/mob-bossbar-fabric-*.jar
            paper/build/libs/mob-bossbar-paper-*.jar
            !fabric/build/libs/*-sources.jar
            !paper/build/libs/*-sources.jar
