name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release jars
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle clean build --warning-mode all

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp fabric/build/libs/mob-bossbar-fabric-*.jar dist/
          cp paper/build/libs/mob-bossbar-paper-*.jar dist/
          rm -f dist/*-sources.jar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Mob Bossbar ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.jar
          generate_release_notes: true
